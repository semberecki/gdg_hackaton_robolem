services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: inventapassword
      POSTGRES_DB: buildwithai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    ports:
      - "8000:8000"

  adk-agent:
    build:
      context: ./adk-agents
      dockerfile: Dockerfile
    environment:
      MCP_SERVER_URL: http://mcp-server:8000/mcp
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_GENAI_USE_VERTEXAI: 1
      GOOGLE_CLOUD_PROJECT: r2d2-00
      PORT: 8081
    ports:
      - "8081:8081"
    volumes:
      - ~/.config/gcloud:/root/.config/gcloud:ro
    depends_on:
      - mcp-server

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:inventapassword@database:5432/buildwithai?schema=public
      ADK_AGENT_URL: http://adk-agent:8081
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - database
      - adk-agent

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
